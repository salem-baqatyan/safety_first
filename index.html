<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة التشفير الآمنة</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }
        textarea, input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        textarea:focus, input:focus {
            border-color: #4facfe;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        .btn-encrypt {
            background: #4facfe;
            color: #fff;
        }
        .btn-encrypt:hover { background: #3a8fd9; }
        
        .btn-decrypt {
            background: #e74c3c;
            color: #fff;
        }
        .btn-decrypt:hover { background: #c0392b; }
        
        #result {
            background: rgba(0, 0, 0, 0.4);
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>أداة التشفير (AES-256-GCM)</h2>
    
    <textarea id="inputText" placeholder="أدخل النص هنا (عربي أو إنجليزي)..."></textarea>
    <input type="password" id="secretKey" placeholder="أدخل مفتاح التشفير (كلمة المرور)...">
    
    <div class="btn-group">
        <button class="btn-encrypt" onclick="processText('encrypt')">تشفير النص</button>
        <button class="btn-decrypt" onclick="processText('decrypt')">فك التشفير</button>
    </div>
    
    <textarea id="result" placeholder="النتيجة ستظهر هنا..." readonly></textarea>
</div>

<script>
    // إعدادات التشفير
    const ITERATIONS = 100000;
    const KEY_LENGTH = 256;
    const HASH_ALGO = "SHA-256";

    // تحويل النص إلى مصفوفة بايتات والعكس
    const enc = new TextEncoder();
    const dec = new TextDecoder();

    // اشتقاق مفتاح قوي من كلمة المرور
    async function getCryptoKey(password, salt) {
        const keyMaterial = await crypto.subtle.importKey(
            "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: ITERATIONS, hash: HASH_ALGO },
            keyMaterial, { name: "AES-GCM", length: KEY_LENGTH }, false, ["encrypt", "decrypt"]
        );
    }

    // دوال المساعدة للتعامل مع Base64
    function bufferToBase64(buffer) {
        return btoa(String.fromCharCode(...new Uint8Array(buffer)));
    }

    function base64ToBuffer(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    // التشفير
    async function encryptData(text, password) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await getCryptoKey(password, salt);
        
        const encryptedContent = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv }, key, enc.encode(text)
        );

        // دمج الملح + IV + النص المشفر في مصفوفة واحدة
        const combined = new Uint8Array(salt.length + iv.length + encryptedContent.byteLength);
        combined.set(salt, 0);
        combined.set(iv, salt.length);
        combined.set(new Uint8Array(encryptedContent), salt.length + iv.length);

        return bufferToBase64(combined);
    }

    // فك التشفير
    async function decryptData(encryptedBase64, password) {
        const combined = new Uint8Array(base64ToBuffer(encryptedBase64));
        
        // استخراج الملح و IV والنص المشفر
        const salt = combined.slice(0, 16);
        const iv = combined.slice(16, 28);
        const data = combined.slice(28);

        const key = await getCryptoKey(password, salt);
        
        const decryptedContent = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv }, key, data
        );

        return dec.decode(decryptedContent);
    }

    // المعالجة الأساسية للواجهة
    async function processText(action) {
        const text = document.getElementById('inputText').value;
        const key = document.getElementById('secretKey').value;
        const resultBox = document.getElementById('result');

        if (!text || !key) {
            alert("الرجاء إدخال النص ومفتاح التشفير!");
            return;
        }

        try {
            if (action === 'encrypt') {
                resultBox.value = await encryptData(text, key);
            } else {
                resultBox.value = await decryptData(text, key);
            }
        } catch (error) {
            resultBox.value = "خطأ: تأكد من صحة النص المشفر ومفتاح التشفير.";
            console.error(error);
        }
    }
</script>
</body>
</html>
