<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة التشفير الآمنة</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }
        textarea, input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px;
            padding-left: 45px; 
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        textarea:focus, input:focus {
            border-color: #4facfe;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .icon-btn {
            position: absolute;
            left: 10px;
            top: 10px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
            border-radius: 4px;
        }
        .icon-btn:hover {
            color: #4facfe;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        .btn-encrypt {
            background: #4facfe;
            color: #fff;
        }
        .btn-encrypt:hover { background: #3a8fd9; }
        .btn-decrypt {
            background: #e74c3c;
            color: #fff;
        }
        .btn-decrypt:hover { background: #c0392b; }
        #result {
            background: rgba(0, 0, 0, 0.4);
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>السلامة اولا</h2>
    
    <div class="input-wrapper">
        <textarea id="inputText" placeholder="أدخل النص هنا (عربي أو إنجليزي)..."></textarea>
        <button class="icon-btn" onclick="pasteText()" title="لصق النص">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
        </button>
    </div>

    <div class="input-wrapper">
        <input type="password" id="secretKey" placeholder="أدخل مفتاح التشفير (كلمة المرور)...">
        <button class="icon-btn" id="eyeIconBtn" onclick="togglePassword()" title="إظهار/إخفاء المفتاح">
            <svg id="eyeIcon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
    </div>
    
    <div class="btn-group">
        <button class="action-btn btn-encrypt" onclick="processText('encrypt')">تشفير النص</button>
        <button class="action-btn btn-decrypt" onclick="processText('decrypt')">فك التشفير</button>
    </div>
    
    <div class="input-wrapper" style="margin-bottom: 0;">
        <textarea id="result" placeholder="النتيجة ستظهر هنا..." readonly></textarea>
        <button class="icon-btn" id="copyBtn" onclick="copyText()" title="نسخ النتيجة">
            <svg id="copyIcon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
    </div>
</div>

<script>
    const ITERATIONS = 100000;
    const KEY_LENGTH = 256;
    const HASH_ALGO = "SHA-256";

    const enc = new TextEncoder();
    const dec = new TextDecoder();

    async function getCryptoKey(password, salt) {
        const keyMaterial = await crypto.subtle.importKey(
            "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: ITERATIONS, hash: HASH_ALGO },
            keyMaterial, { name: "AES-GCM", length: KEY_LENGTH }, false, ["encrypt", "decrypt"]
        );
    }

    function bufferToBase64(buffer) {
        return btoa(String.fromCharCode(...new Uint8Array(buffer)));
    }

    function base64ToBuffer(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    async function encryptData(text, password) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await getCryptoKey(password, salt);
        
        const encryptedContent = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv }, key, enc.encode(text)
        );

        const combined = new Uint8Array(salt.length + iv.length + encryptedContent.byteLength);
        combined.set(salt, 0);
        combined.set(iv, salt.length);
        combined.set(new Uint8Array(encryptedContent), salt.length + iv.length);

        return bufferToBase64(combined);
    }

    async function decryptData(encryptedBase64, password) {
        const combined = new Uint8Array(base64ToBuffer(encryptedBase64));
        const salt = combined.slice(0, 16);
        const iv = combined.slice(16, 28);
        const data = combined.slice(28);

        const key = await getCryptoKey(password, salt);
        const decryptedContent = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv }, key, data
        );

        return dec.decode(decryptedContent);
    }

    async function processText(action) {
        const text = document.getElementById('inputText').value;
        const key = document.getElementById('secretKey').value;
        const resultBox = document.getElementById('result');

        if (!text || !key) {
            alert("الرجاء إدخال النص ومفتاح التشفير!");
            return;
        }

        try {
            if (action === 'encrypt') {
                resultBox.value = await encryptData(text, key);
            } else {
                resultBox.value = await decryptData(text, key);
            }
        } catch (error) {
            resultBox.value = "خطأ: تأكد من صحة النص المشفر ومفتاح التشفير.";
        }
    }

    // وظيفة لصق النص
    async function pasteText() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('inputText').value = text;
        } catch (err) {
            alert("يرجى منح صلاحية الوصول للحافظة أو لصق النص يدوياً.");
        }
    }

    // وظيفة نسخ النص
    async function copyText() {
        const resultText = document.getElementById('result').value;
        if (!resultText) return;
        try {
            await navigator.clipboard.writeText(resultText);
            const copyBtn = document.getElementById('copyBtn');
            const originalIcon = copyBtn.innerHTML;
            // إظهار علامة صح لثانيتين كدليل على النسخ
            copyBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="#4facfe" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            setTimeout(() => {
                copyBtn.innerHTML = originalIcon;
            }, 2000);
        } catch (err) {
            alert("فشل نسخ النص تلقائياً.");
        }
    }

    // وظيفة إظهار وإخفاء المفتاح
    function togglePassword() {
        const pwdInput = document.getElementById('secretKey');
        const eyeIconBtn = document.getElementById('eyeIconBtn');
        
        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
            eyeIconBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
        } else {
            pwdInput.type = 'password';
            eyeIconBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
        }
    }
</script>
</body>
</html>
