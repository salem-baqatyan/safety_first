<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة التشفير الآمنة - نصوص وصور</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 { text-align: center; margin-bottom: 20px; font-weight: 500; color: #4facfe; }
        
        .input-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
        
        textarea, input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px;
            padding-left: 45px; 
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        textarea:focus, input:focus { border-color: #4facfe; }
        textarea { resize: vertical; min-height: 80px; }

        .file-input-wrapper {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="file"] { padding: 8px; padding-left: 10px; font-size: 14px; }

        .icon-btn {
            position: absolute; left: 10px; top: 10px;
            background: none; border: none; color: #aaa;
            cursor: pointer; padding: 5px; display: flex;
            transition: 0.3s; border-radius: 4px;
        }
        .icon-btn:hover { color: #4facfe; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-encrypt { background: #4facfe; color: #fff; }
        .btn-encrypt:hover { background: #3a8fd9; }
        .btn-decrypt { background: #e74c3c; color: #fff; }
        .btn-decrypt:hover { background: #c0392b; }

        #imagePreview {
            display: none;
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            background: rgba(0,0,0,0.2);
        }
        .label-text { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>تشفير الصور والنصوص</h2>
    
    <span class="label-text">اختر صورة لتشفيرها (اختياري):</span>
    <div class="file-input-wrapper">
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect()">
    </div>

    <div class="input-wrapper">
        <textarea id="inputText" placeholder="أدخل النص أو كود الصورة المشفر هنا..."></textarea>
        <button class="icon-btn" onclick="pasteText()" title="لصق">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
        </button>
    </div>

    <div class="input-wrapper">
        <input type="password" id="secretKey" placeholder="مفتاح التشفير (كلمة المرور)...">
        <button class="icon-btn" id="eyeIconBtn" onclick="togglePassword()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
    </div>
    
    <div class="btn-group">
        <button class="action-btn btn-encrypt" onclick="processData('encrypt')">تشفير</button>
        <button class="action-btn btn-decrypt" onclick="processData('decrypt')">فك التشفير</button>
    </div>
    
    <div class="input-wrapper" style="margin-bottom: 0;">
        <textarea id="result" placeholder="النتيجة المشفرة تظهر هنا..." readonly></textarea>
        <button class="icon-btn" id="copyBtn" onclick="copyText()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
    </div>

    <img id="imagePreview" alt="معاينة الصورة">
</div>

<script>
    // عند اختيار صورة، نقوم بتحويلها إلى Base64 ووضعها في النص
    function handleImageSelect() {
        const file = document.getElementById('imageInput').files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            document.getElementById('inputText').value = reader.result;
            const preview = document.getElementById('imagePreview');
            preview.src = reader.result;
            preview.style.display = 'block';
        }
        if (file) reader.readAsDataURL(file);
    }

    async function processData(action) {
        if (typeof CryptoJS === 'undefined') {
            alert("المكتبة لم تُحمل بعد!"); return;
        }

        const data = document.getElementById('inputText').value;
        const key = document.getElementById('secretKey').value;
        const resultBox = document.getElementById('result');
        const preview = document.getElementById('imagePreview');

        if (!data || !key) {
            alert("يرجى إدخال البيانات والمفتاح!"); return;
        }

        try {
            if (action === 'encrypt') {
                const encrypted = CryptoJS.AES.encrypt(data, key);
                resultBox.value = encrypted.toString();
                preview.style.display = 'none'; // إخفاء المعاينة عند التشفير
            } else {
                const decrypted = CryptoJS.AES.decrypt(data, key);
                const originalData = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (!originalData) throw new Error();

                resultBox.value = originalData;

                // إذا كانت النتيجة تبدأ بـ data:image فهي صورة، نعرضها
                if (originalData.startsWith('data:image')) {
                    preview.src = originalData;
                    preview.style.display = 'block';
                } else {
                    preview.style.display = 'none';
                }
            }
        } catch (e) {
            alert("خطأ: تأكد من صحة البيانات أو المفتاح.");
            resultBox.value = "";
        }
    }

    async function pasteText() {
        const text = await navigator.clipboard.readText();
        document.getElementById('inputText').value = text;
    }

    function copyText() {
        const res = document.getElementById('result');
        if (!res.value) return;
        navigator.clipboard.writeText(res.value);
        const copyBtn = document.getElementById('copyBtn');
        const oldHtml = copyBtn.innerHTML;
        copyBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="#4facfe" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        setTimeout(() => copyBtn.innerHTML = oldHtml, 2000);
    }

    function togglePassword() {
        const p = document.getElementById('secretKey');
        p.type = p.type === 'password' ? 'text' : 'password';
    }
</script>
</body>
</html>
